<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Indicador de Personalidade</title>
<style>
  :root{ --navy:#0b2545; --navy2:#13315c; --gold:#c89b3c; --ink:#1c2433; --muted:#6b7488; --line:#e4e7ee; --bg:#f4f6fb; --card:#fff; --soft:#eef2f9; --ok:#1f7a52; --warn:#b3261e; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.5}
  #app{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
  h1,h2,h3{font-family:Georgia,serif;color:var(--navy)} h1{font-size:24px} h2{font-size:19px} h3{font-size:15px}
  .brand{font-family:Georgia,serif;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--gold);font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:0 6px 24px rgba(11,37,69,.05);margin-bottom:18px}
  label{display:block;margin:12px 0;font-weight:600;color:var(--navy2);font-size:14px}
  input,select{display:block;width:100%;margin-top:6px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,155,60,.15)}
  .btn{border:1px solid transparent;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;margin:6px 6px 0 0}
  .btn.primary{background:var(--navy);color:#fff} .btn.primary:hover{background:var(--navy2)}
  .btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line)}
  .btn.sm{padding:6px 11px;font-size:12.5px} .btn.gold{background:var(--gold);color:#fff}
  .err{color:var(--warn);font-size:13px;min-height:16px;margin:6px 0} .ok{color:var(--ok);font-size:13px}
  .muted{color:var(--muted)} .small{font-size:12.5px}
  table.data{width:100%;border-collapse:collapse;font-size:13.5px}
  table.data th,table.data td{border-bottom:1px solid var(--line);padding:8px 8px;text-align:left}
  table.data th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .chip{display:inline-block;background:var(--navy);color:#fff;border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px;font-family:Georgia,serif}
  .badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700}
  .b-gerado{background:#eef2f9;color:var(--navy2)} .b-revisado{background:#fff3d6;color:#8a6d1f} .b-enviado{background:#e3f3ea;color:var(--ok)} .b-none{background:#f3f4f6;color:var(--muted)}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .tab{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:600;font-size:13.5px;color:var(--navy2)}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .kv{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 0;font-size:13.5px}
  .qa{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;font-size:12px}
  .qa div{background:var(--soft);border-radius:5px;padding:3px 6px}
  @media(max-width:720px){ .grid2{grid-template-columns:1fr} }
</style>
</head>
<body>
<main id="app"><div class="card">Carregando...</div></main>
<script src="config.js"></script>
<script>
"use strict";
const ADMIN_URL = CONFIG.FN_URL.replace("respondent-api","admin-api");
const COHORTS_URL = CONFIG.FN_URL.replace("respondent-api","cohorts-api");
const FIX_URL = CONFIG.FN_URL.replace("respondent-api","admin-fix");
let ADMIN_KEY = ""; try { ADMIN_KEY = localStorage.getItem("ip_admin_key") || ""; } catch {}
const app = () => document.getElementById("app");
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function show(h){ app().innerHTML = h; }

async function adminCall(action, payload={}){
  const res = await fetch(ADMIN_URL, { method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-key":ADMIN_KEY },
    body: JSON.stringify({ action, ...payload }) });
  return res.json();
}
async function cohortCall(action, payload={}){
  const res = await fetch(COHORTS_URL, { method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-key":ADMIN_KEY },
    body: JSON.stringify({ action, ...payload }) });
  return res.json();
}
async function fixCall(action, payload={}){
  const res = await fetch(FIX_URL, { method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-key":ADMIN_KEY },
    body: JSON.stringify({ action, ...payload }) });
  return res.json();
}

/* ---------- Login por chave ---------- */
function loginScreen(msg=""){
  show(`<div class="card" style="max-width:460px;margin:8vh auto">
    <div class="brand">Jornada Extraordinária</div>
    <h1>Painel do administrador</h1>
    <p class="muted small">Acesso restrito. Informe sua chave de administrador.</p>
    <label>Chave de administrador <input id="key" type="password" placeholder="JADM-XXXXX-XXXXX-XXXXX" autocomplete="off"></label>
    <div id="msg" class="err">${esc(msg)}</div>
    <button class="btn primary" id="enter">Entrar</button>
  </div>`);
  document.getElementById("enter").onclick = doLogin;
  document.getElementById("key").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
}
async function doLogin(){
  const key = document.getElementById("key").value.trim();
  const msg = document.getElementById("msg");
  if(!key){ msg.textContent="Informe a chave."; return; }
  msg.textContent="Entrando...";
  ADMIN_KEY = key;
  const who = await adminCall("whoami");
  if(!who.ok){ ADMIN_KEY=""; msg.textContent = who.message || "Chave inválida."; return; }
  try { localStorage.setItem("ip_admin_key", key); } catch {}
  render();
}

/* ---------- Dashboard ---------- */
let TAB="lista";
async function boot(){
  if(!ADMIN_KEY){ loginScreen(); return; }
  const who = await adminCall("whoami");
  if(!who.ok){ ADMIN_KEY=""; try{localStorage.removeItem("ip_admin_key");}catch{} loginScreen(); return; }
  render();
}
async function render(){
  show(`<div class="topbar">
    <div><div class="brand">Jornada Extraordinária</div><h1>Painel do administrador</h1></div>
    <div><button class="btn ghost sm" id="out">Sair</button></div></div>
    <div class="tabs">
      <div class="tab ${TAB==='lista'?'active':''}" data-t="lista">Respondentes</div>
      <div class="tab ${TAB==='casais'?'active':''}" data-t="casais">Casais</div>
      <div class="tab ${TAB==='emparelhar'?'active':''}" data-t="emparelhar">Emparelhamento</div>
      <div class="tab ${TAB==='turmas'?'active':''}" data-t="turmas">Turmas</div>
      <div class="tab ${TAB==='auditoria'?'active':''}" data-t="auditoria">Auditoria</div>
    </div>
    <div id="panel"><div class="card">Carregando...</div></div>`);
  document.getElementById("out").onclick=()=>{ ADMIN_KEY=""; try{localStorage.removeItem("ip_admin_key");}catch{} loginScreen(); };
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{ TAB=t.dataset.t; render(); });
  if(TAB==="lista") panelList();
  else if(TAB==="casais") panelCouples();
  else if(TAB==="emparelhar") panelPair();
  else if(TAB==="turmas") panelCohorts();
  else if(TAB==="auditoria") panelAudit();
}
function statusBadge(s){ const m={gerado:"b-gerado",em_revisao:"b-gerado",revisado:"b-revisado",enviado:"b-enviado"}; return s?`<span class="badge ${m[s]||'b-none'}">${esc(s)}</span>`:`<span class="badge b-none">—</span>`; }

async function panelList(){
  const r = await adminCall("list");
  const rows = (r.respondentes||[]).map(x=>`<tr>
    <td>${esc(x.nome)}</td>
    <td>${x.tipo?`<span class="chip">${esc(x.tipo)}</span>`:'<span class="muted">—</span>'}</td>
    <td>${esc(x.genero)}</td>
    <td class="small">${esc(x.codigo_casal)}</td>
    <td>${esc(x.status)}</td>
    <td>${statusBadge(x.completo_status)}</td>
    <td><button class="btn sm ghost" data-id="${x.id}">Abrir</button></td></tr>`).join("");
  document.getElementById("panel").innerHTML = `<div class="card">
    <h2>Respondentes (${(r.respondentes||[]).length})</h2>
    <table class="data"><thead><tr><th>Nome</th><th>Tipo</th><th>Gênero</th><th>Código</th><th>Questionário</th><th>Relatório completo</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=7 class="muted">Nenhum respondente.</td></tr>'}</tbody></table></div>`;
  document.querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>detail(b.dataset.id));
}
async function detail(id){
  const d = await adminCall("detail",{id});
  const r=d.respondent, res=d.result;
  const rep=(d.reports||[]).find(x=>x.kind==="completo");
  const ans=(d.answers||[]).map(a=>`<div>${a.item}: <b>${a.opcao}</b></div>`).join("");
  document.getElementById("panel").innerHTML=`<div class="card">
    <button class="btn ghost sm" id="back">← Voltar</button>
    <h2>${esc(r.nome)} ${res?`<span class="chip">${esc(res.tipo)}</span>`:''}</h2>
    <div class="grid2">
      <div><div class="kv"><span>Gênero</span><b>${esc(r.genero)}</b></div>
        <div class="kv"><span>Cônjuge</span><b>${esc(r.conjuge_nome||'—')}</b></div>
        <div class="kv"><span>Código do casal</span><b>${esc(r.codigo_casal)}</b></div>
        <div class="kv"><span>Status</span><b>${esc(r.status)}</b></div>
        <div class="kv"><span>Consentimento</span><b>${r.consent_given?'Sim ('+esc(r.consent_version)+')':'Não'}</b></div>
        <div class="kv"><span>Relatório completo</span><b>${statusBadge(rep?.status)}</b></div>
      </div>
      <div><h3>Ações</h3>
        <button class="btn primary sm" id="gen">${rep?'Regerar e ver relatório':'Gerar relatório completo'}</button>
        <div style="margin-top:8px"><label class="small">Marcar status do relatório
          <select id="st"><option value="revisado">Revisado</option><option value="enviado">Enviado</option><option value="em_revisao">Em revisão</option></select></label>
          <label class="small">Canal de envio (se enviado)<input id="ch" placeholder="e-mail / WhatsApp / impresso"></label>
          <button class="btn gold sm" id="setst">Salvar status</button></div>
      </div>
    </div>
    <h3 style="margin-top:16px">Respostas (somente leitura)</h3>
    <div class="qa">${ans}</div>
    <p class="small muted">As respostas são imutáveis e não podem ser corrigidas, apenas o emparelhamento.</p>
  </div>`;
  document.getElementById("back").onclick=()=>render();
  document.getElementById("gen").onclick=async()=>{
    const btn=document.getElementById("gen"); const orig=btn.textContent; btn.textContent="Gerando...";
    const g=await adminCall("generate_full",{id});
    btn.textContent=orig;
    if(!g.ok){ alert(g.message||g.error); return; }
    showReport(g.html, ()=>detail(id));
  };
  document.getElementById("setst").onclick=async()=>{
    const status=document.getElementById("st").value; const channel=document.getElementById("ch").value;
    const s=await adminCall("set_status",{id,status,channel});
    if(s.ok){ alert("Status atualizado."); detail(id); }
  };
}
async function panelCouples(){
  const r = await adminCall("list");
  const byCode={}; (r.respondentes||[]).forEach(x=>{ (byCode[x.codigo_casal]=byCode[x.codigo_casal]||[]).push(x); });
  const codes=Object.keys(byCode);
  const cards=[];
  for(const code of codes){ if(byCode[code].length<2) continue; cards.push(`<div class="card"><h3>Casal · ${esc(code)}</h3><div id="c_${esc(code)}" class="muted small">Carregando...</div></div>`); }
  document.getElementById("panel").innerHTML = cards.length?cards.join(""):`<div class="card muted">Nenhum casal com os dois respondentes ainda.</div>`;
  for(const code of codes){ if(byCode[code].length<2) continue; renderCouple(code); }
}
async function renderCouple(code){
  const c = await adminCall("couple",{codigo:code});
  const el=document.getElementById("c_"+code); if(!el) return;
  if(!c.ok||!c.couple||c.couple.length<2){ el.textContent="Aguardando os dois concluírem."; return; }
  const [a,b]=c.couple;
  const col=(x)=>{ const res=x.result; const ax=res?.axes||{};
    const bars=["EI","SN","TF","JP"].map(k=>{const z=ax[k]; if(!z)return""; return `<div class="kv"><span>${z.winner}</span><b>${z.winCount}</b></div>`}).join("");
    return `<div><h3>${esc(x.respondent.nome)} ${res?`<span class="chip">${esc(res.tipo)}</span>`:''}</h3>${bars}</div>`; };
  const ambos = a.result && b.result;
  el.innerHTML = `<div class="grid2">${col(a)}${col(b)}</div>`+
    (ambos?`<div style="margin-top:10px"><button class="btn gold sm" data-couple="${esc(code)}">Gerar relatório do casal</button></div>`
          :`<p class="small muted" style="margin-top:8px">O relatório do casal fica disponível quando os dois concluírem.</p>`);
  const btn = el.querySelector("[data-couple]");
  if(btn) btn.onclick = async ()=>{ btn.textContent="Gerando..."; const g=await adminCall("generate_couple",{codigo:code});
    btn.textContent="Gerar relatório do casal";
    if(!g.ok){ alert(g.message||g.error); return; }
    showReport(g.html, ()=>render()); };
}
async function panelPair(){
  const o = await fixCall("codes_overview");
  if(!o.ok){ document.getElementById("panel").innerHTML=`<div class="card err">${esc(o.message||o.error||'Erro ao carregar.')}</div>`; return; }
  const grupos = o.grupos||[];
  const blocks = grupos.map(g=>{
    const n=g.n;
    const flag = n>=3 ? `<span class="badge" style="background:#fde0e0;color:#b3261e">código repetido (${n})</span>`
              : n===1 ? `<span class="badge b-gerado">aguardando o par</span>`
              : `<span class="badge b-enviado">casal completo</span>`;
    const membros = g.membros.map(m=>`<tr>
        <td>${esc(m.nome)} ${m.tipo?`<span class="chip">${esc(m.tipo)}</span>`:''}</td>
        <td class="small">${esc(m.genero)}</td>
        <td class="small">cônjuge informado: ${esc(m.conjuge_nome||'—')}</td>
        <td><input class="small" style="width:150px;display:inline-block" id="nc_${m.id}" placeholder="novo código"></td>
        <td><button class="btn sm gold" data-fix="${m.id}">Corrigir código</button></td>
      </tr>`).join("");
    return `<div class="card"><h3>Código: ${esc(g.codigo)} &nbsp; ${flag}</h3>
      <table class="data"><tbody>${membros}</tbody></table></div>`;
  }).join("");
  document.getElementById("panel").innerHTML = `<div class="card">
      <h2>Códigos do casal</h2>
      <p class="small muted">Cada bloco é um código. <b>Casal completo</b> = dois respondentes. <b>Aguardando o par</b> = só um informou esse código. <b>Código repetido</b> = mais de dois usaram o mesmo código (erro a corrigir). Para corrigir, digite o código certo na linha da pessoa e clique em Corrigir código. Para juntar um casal que digitou códigos diferentes, coloque os dois no mesmo código. Isso não altera as respostas.</p>
    </div>` + (blocks||'<div class="card muted">Nenhum respondente ainda.</div>');
  document.querySelectorAll("[data-fix]").forEach(btn=>btn.onclick=async()=>{
    const id=btn.dataset.fix; const novo=(document.getElementById("nc_"+id).value||"").trim();
    if(!novo){ alert("Digite o novo código para essa pessoa."); return; }
    if(!confirm("Mudar o código desta pessoa para \""+novo.toUpperCase()+"\"? O pareamento será refeito por este código.")) return;
    btn.textContent="..."; const s=await fixCall("set_codigo",{id,codigo:novo});
    if(!s.ok){ alert(s.message||s.error); btn.textContent="Corrigir código"; return; }
    panelPair();
  });
}
async function panelCohorts(){
  const r = await cohortCall("list");
  if(!r.ok){ document.getElementById("panel").innerHTML=`<div class="card err">${esc(r.message||r.error||'Erro ao carregar turmas.')}</div>`; return; }
  const rows = (r.cohorts||[]).map(c=>`<tr>
    <td>${esc(c.nome)}</td>
    <td><span class="chip">${esc(c.invite_code)}</span></td>
    <td>${c.respondentes}</td>
    <td>${c.ativo?'<span class="badge b-enviado">ativa</span>':'<span class="badge b-none">inativa</span>'}</td>
    <td><button class="btn sm ghost" data-cid="${c.id}" data-act="${c.ativo?'off':'on'}">${c.ativo?'Desativar':'Ativar'}</button></td></tr>`).join("");
  document.getElementById("panel").innerHTML = `<div class="card">
    <h2>Turmas e códigos de convite</h2>
    <p class="muted small">Cada turma tem um código que os participantes informam ao iniciar. Desative para encerrar novos cadastros.</p>
    <label>Nome da nova turma<input id="newcohort" placeholder="Ex.: Turma Março 2026"></label>
    <div id="cohort_err" class="err"></div>
    <button class="btn primary sm" id="addcohort">Criar turma</button>
    <table class="data" style="margin-top:14px"><thead><tr><th>Turma</th><th>Código de convite</th><th>Respondentes</th><th>Status</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=5 class="muted">Nenhuma turma.</td></tr>'}</tbody></table></div>`;
  document.getElementById("addcohort").onclick = async ()=>{
    const nome=document.getElementById("newcohort").value.trim();
    if(!nome){ document.getElementById("cohort_err").textContent="Informe o nome da turma."; return; }
    const g=await cohortCall("create",{nome});
    if(!g.ok){ document.getElementById("cohort_err").textContent=g.detail||g.error; return; }
    panelCohorts();
  };
  document.querySelectorAll("[data-cid]").forEach(b=>b.onclick=async()=>{ await cohortCall("toggle",{id:b.dataset.cid, ativo:b.dataset.act==='on'}); panelCohorts(); });
}
function showReport(html, backFn){
  const panel = document.getElementById("panel");
  panel.innerHTML = `<div class="card">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn primary sm" id="printrep">Imprimir / Salvar PDF</button>
      <button class="btn ghost sm" id="backrep">← Voltar</button>
    </div>
    <iframe id="repframe" style="width:100%;height:78vh;border:1px solid var(--line);border-radius:8px;background:#fff"></iframe>
  </div>`;
  const f = document.getElementById("repframe");
  f.srcdoc = html;
  document.getElementById("printrep").onclick = ()=>{ try{ f.contentWindow.focus(); f.contentWindow.print(); }catch{ alert("Use o menu Arquivo > Imprimir."); } };
  document.getElementById("backrep").onclick = backFn;
}
async function panelAudit(){
  const r = await adminCall("audit");
  const rows=(r.eventos||[]).map(e=>`<tr><td class="small">${new Date(e.at).toLocaleString("pt-BR")}</td><td>${esc(e.actor_type)}</td><td class="small">${esc(e.actor_id||'')}</td><td>${esc(e.action)}</td><td class="small">${esc(e.target||'')}</td></tr>`).join("");
  document.getElementById("panel").innerHTML=`<div class="card"><h2>Auditoria (últimos 100)</h2>
    <table class="data"><thead><tr><th>Quando</th><th>Ator</th><th>ID</th><th>Ação</th><th>Alvo</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

boot();
</script>
</body>
</html>
