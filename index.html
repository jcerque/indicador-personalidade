<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicador de Personalidade · Jornada Extraordinária</title>
<style>
  :root{ --navy:#0b2545; --navy2:#13315c; --gold:#c89b3c; --gold-soft:#e7c66b;
    --ink:#1c2433; --muted:#6b7488; --line:#e4e7ee; --bg:#f4f6fb; --card:#fff; --soft:#eef2f9; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  #app{max-width:820px;margin:0 auto;padding:28px 18px 64px}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;color:var(--navy);line-height:1.2}
  h1{font-size:30px;margin:.2em 0} h2{font-size:22px;margin:.2em 0 .5em} h3{font-size:17px;margin:1em 0 .4em}
  p{margin:.6em 0} .muted{color:var(--muted)} .small{font-size:13px}
  .err{color:#b3261e;font-size:14px;min-height:18px;margin:6px 0}
  a{color:var(--navy2)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:30px;box-shadow:0 8px 30px rgba(11,37,69,.06)}
  .brand{font-family:Georgia,serif;letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--gold);font-weight:700;margin-bottom:8px}
  .welcome .sub{color:var(--muted);margin-top:-6px;font-style:italic}
  label{display:block;margin:16px 0;font-weight:600;color:var(--navy2)}
  .req{font-weight:600;color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-left:6px}
  input,select{display:block;width:100%;margin-top:7px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-weight:400;color:var(--ink);background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,155,60,.15)}
  small{display:block;font-weight:400;color:var(--muted);margin-top:6px;font-size:13px}
  .invite-ok{margin:16px 0;background:#e3f3ea;color:#1f7a52;border-radius:10px;padding:11px 14px;font-weight:600;font-size:14px}
  .invite-ok .muted{color:#5a8a72;font-weight:400}
  .consent{margin:18px 0;background:var(--soft);border-radius:10px;padding:14px 16px}
  .check{display:flex;gap:10px;align-items:flex-start;font-weight:400;color:var(--ink);margin:0;font-size:13.5px}
  .check input{width:auto;margin-top:3px;flex:0 0 auto}
  .codebox{font-family:Georgia,serif;font-size:30px;letter-spacing:.18em;color:var(--navy);background:var(--soft);border:2px dashed var(--gold);border-radius:12px;padding:18px;text-align:center;font-weight:700;margin:12px 0}
  .btn{appearance:none;border:1px solid transparent;border-radius:10px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer;margin:8px 8px 0 0;transition:.15s}
  .btn.primary{background:var(--navy);color:#fff} .btn.primary:hover{background:var(--navy2)}
  .btn.ghost{background:transparent;color:var(--navy);border-color:var(--line)} .btn.ghost:hover{border-color:var(--navy)}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:22px}
  .progress-wrap{position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0 14px}
  .progress-bar{height:8px;background:var(--soft);border-radius:99px;overflow:hidden}
  .progress-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .25s}
  .progress-txt{font-size:12px;color:var(--muted);margin-top:5px;text-align:right}
  .part-head .step{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .qlist{margin-top:10px}
  .q{padding:16px 0;border-top:1px solid var(--line)} .q:first-child{border-top:none}
  .qtext{font-weight:600;color:var(--navy2);margin-bottom:10px}
  .qn{display:inline-block;min-width:24px;color:var(--gold);font-weight:800;font-family:Georgia,serif}
  .wordpair .qn{margin-bottom:6px}
  .choices{display:grid;gap:10px} .choices.pair{grid-template-columns:1fr 1fr}
  .choice{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14.5px;color:var(--ink);cursor:pointer;transition:.12s;line-height:1.4}
  .choice:hover{border-color:var(--gold-soft);background:#fffdf7}
  .choice.sel{border-color:var(--navy);background:var(--navy);color:#fff} .choice.sel b{color:var(--gold-soft)}
  .choice b{color:var(--navy)} .pair .choice{text-align:center;font-weight:600}
  .result{text-align:center}
  .typebadge{margin:18px auto;display:inline-block;padding:18px 36px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;min-width:220px}
  .typebadge .type{font-family:Georgia,serif;font-size:44px;letter-spacing:.12em;font-weight:700}
  .typebadge .apelido{color:var(--gold-soft);font-size:18px;font-weight:600} .typebadge .tituloT{font-size:13px;opacity:.85}
  .legend{font-size:12.5px;color:var(--muted)}
  .pref-table{width:100%;border-collapse:collapse;margin:12px 0;text-align:left}
  .pref-table td{border:1px solid var(--line);padding:9px 11px;font-size:13.5px}
  .pref-dim{font-weight:600;color:var(--navy2);width:36%}
  .pref-cell{color:var(--muted)} .pref-cell.on{background:#fffaf0;color:var(--navy);font-weight:600}
  .pref-cell .letter{display:inline-block;width:21px;height:21px;line-height:21px;text-align:center;border-radius:5px;background:var(--soft);font-weight:800;margin-right:6px;color:var(--navy)}
  .pref-cell.on .letter{background:var(--gold);color:#fff}
  .icp{margin:14px 0;display:flex;flex-direction:column;gap:11px;text-align:left}
  .icp-row{display:grid;grid-template-columns:38% 1fr 22%;align-items:center;gap:8px}
  .icp-axis{font-size:13px;color:var(--navy)}
  .icp-axis .pl{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:4px;background:var(--gold);color:#fff;font-weight:700}
  .icp-opp{color:var(--muted);font-size:11px;margin-top:1px}
  .icp-track{position:relative;height:16px;background:var(--soft);border-radius:5px}
  .icp-fill{position:absolute;left:0;top:0;bottom:0;background:var(--navy2);border-radius:5px}
  .icp-clar{text-align:right;font-size:10.5px;letter-spacing:.03em;color:var(--gold);font-weight:700;text-transform:uppercase}
  .icp-score{color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;margin-top:1px}
  @media(max-width:560px){ .card{padding:20px} .choices.pair{grid-template-columns:1fr}
    .icp-row{grid-template-columns:42% 1fr 24%} .typebadge .type{font-size:36px} .codebox{font-size:24px} }
</style>
</head>
<body>
  <main id="app"></main>
  <script src="config.js"></script>
  <script src="data-questions.js"></script>
  <script src="data-types.js"></script>
  <script src="front.js"></script>
</body>
</html>
